<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Virtual Gallery | Callum Cooper</title>
    <style>
      /* Force the gallery to fill the entire browser window */
      html, body {
        background: #000; /* Deep black background */
        width: 100%;
        height: 100%;
        overflow: hidden; /* Removes all scrollbars */
        padding: 0;
        margin: 0;
      }
      #unity-canvas {
        width: 100vw !important;
        height: 100vh !important;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/Build.loader.js"></script>
    <script>
      // Optimized mobile handling
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Build.data.unityweb",
        frameworkUrl: "Build/Build.framework.js.unityweb",
        codeUrl: "Build/Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "webgallery",
        productVersion: "0.1.0",
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
